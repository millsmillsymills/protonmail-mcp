name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: unit tests
        run: go test ./... -race
      - name: integration tests
        run: go test -tags=integration ./... -race
