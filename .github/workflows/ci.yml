name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: mod verify
        run: go mod verify
      - name: gofmt
        run: |
          out=$(git ls-files -z '*.go' | xargs -0 gofmt -l)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            git ls-files -z '*.go' | xargs -0 gofmt -d
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
      - name: unit tests
        env:
          CI_REQUIRE_CASSETTES: "1"
        run: go test ./... -race
      - name: integration tests
        env:
          CI_REQUIRE_CASSETTES: "1"
        run: go test -tags=integration ./... -race
